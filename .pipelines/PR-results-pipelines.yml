# Results-PR-Validation: https://dev.azure.com/neesh90900932/PythonWorks/_build?definitionId=2&_a=summary
# name: Results Microservice - PR Build & Security Gate
#
# This pipeline VALIDATES the result microservice on changes: it builds the image
# and runs security gates, but it does NOT push to ACR. Publishing (build -> push,
# plus Trivy/Cosign/Syft supply-chain steps) lives in results-pipelines.yml.
name: '1.0.10$(Build.BuildId)'

# CI trigger disabled: this is a PR validation gate — it runs on pull requests or manually,
# never on direct pushes (without this, ADO defaults to CI on every branch).
# trigger: none

# PR validation (GitHub): run on PRs targeting main that touch the result service, this
# pipeline itself, or the shared Trivy suppression file. ADO posts the result as a status
# check on the GitHub PR; make it blocking via a GitHub branch protection rule.
pr:
  branches:
    include:
      - main
  paths:
    include:
      - result/*
      - .pipelines/PR-results-pipelines.yml
      - .trivyignore

resources:
- repo: self

variables:
  - name: imageRepository
    value: 'votingapp-result'
  - name: dockerfilePath
    value: '$(Build.SourcesDirectory)/result/Dockerfile'
  - name: tag
    value: '1.0.$(Build.BuildId)'
  - name: vmImageName
    value: 'ubuntu-latest'
  # Pinned tool version for reproducible scans (bump deliberately).
  - name: gitleaksVersion
    value: '8.18.4'

stages:
- stage: Validate
  displayName: Build & Security Scan
  jobs:
  - job: BuildAndScan
    displayName: Build & Scan
    pool:
      vmImage: $(vmImageName)
    steps:
    # 1) Secret scanning (fail-closed). Runs on source before the build so a leaked
    #    credential fails in seconds instead of after a multi-minute image build.
    - task: Bash@3
      displayName: 'Gitleaks - Secret scan'
      inputs:
        targetType: inline
        script: |
          set -e
          echo "Installing Gitleaks v$(gitleaksVersion)..."
          wget -qO gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v$(gitleaksVersion)/gitleaks_$(gitleaksVersion)_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          echo "Scanning working tree for secrets..."
          # --no-git scans current files (predictable for a PR gate); exit code 1 on any finding.
          gitleaks detect --source "$(Build.SourcesDirectory)" --no-git --redact --no-banner -v

    # 2) Node.js SAST (fail-closed). Static analysis of the result service source.
    - task: Bash@3
      displayName: 'Semgrep - Node.js SAST'
      inputs:
        targetType: inline
        script: |
          set -e
          python -m pip install --upgrade pip
          pip install semgrep
          echo "Running Semgrep on result/ ..."
          # p/javascript ruleset; --severity ERROR gates on high/critical only; --error fails the build on findings.
          semgrep --config p/javascript --severity ERROR --error result/

    # 3) Dockerfile misconfiguration scan (fail-closed). Also installs Trivy for step 5.
    - task: Bash@3
      displayName: 'Trivy - Dockerfile config scan'
      inputs:
        targetType: inline
        script: |
          set -e
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          echo "Scanning Dockerfile for misconfigurations..."
          trivy config --severity HIGH,CRITICAL --exit-code 1 --ignorefile "$(Build.SourcesDirectory)/.trivyignore" result/

    # 4) Build the image (no push — this is a validation pipeline).
    - task: Docker@2
      displayName: 'Build Docker image'
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          $(tag)

    # 5) Image vulnerability scan (fail-closed). Trivy is already installed from step 3.
    - task: Bash@3
      displayName: 'Trivy - Image vulnerability scan'
      inputs:
        targetType: inline
        script: |
          set -e
          echo "Scanning built image for HIGH/CRITICAL vulnerabilities..."
          trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed --ignorefile "$(Build.SourcesDirectory)/.trivyignore" $(imageRepository):$(tag)
