# workers-PR-Build: https://dev.azure.com/neesh90900932/PythonWorks/_build?definitionId=2&_a=summary
name: workers Microservice - Build and Push to ACR

#Adding path based trigger as this pipeline only should trigger if changes made in workers microservices.
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - worker/*

resources:
- repo: self

variables:
  - group: voting-platform-secrets
  - name: dockerRegistryServiceConnection
    value: $(ACRRegistryServiceConnection)
  - name: imageRepository
    value: 'votingapp-worker'
  - name: dockerfilePath
    value: '$(Build.SourcesDirectory)/worker/Dockerfile'
  - name: tag
    value: '$(Build.BuildId)'
  - name: vmImageName
    value: 'ubuntu-latest'

stages:
- stage: BuildAndPush
  displayName: Build and Push to ACR
  jobs:
  - job: BuildAndPush
    displayName: Build and Push
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build Docker image
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)

    - task: Docker@2
      displayName: Push image to ACR
      inputs:
        command: push
        repository: $(imageRepository)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
