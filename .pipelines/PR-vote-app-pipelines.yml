# votes-PR-Validation: https://dev.azure.com/neesh90900932/PythonWorks/_build?definitionId=5&_a=summary
# name: Vote Microservice - PR Build & Security Gate
#
# This pipeline VALIDATES the vote microservice on changes: it builds the image
# and runs security gates, but it does NOT push to ACR. Publishing (build -> push,
# plus Trivy/Cosign/Syft supply-chain steps) lives in vote-app-pipelines.yml.
name: '1.0.10$(Build.BuildId)'

resources:
- repo: self

variables:
  - name: imageRepository
    value: 'votingapp-vote'
  - name: dockerfilePath
    value: '$(Build.SourcesDirectory)/vote/Dockerfile'
  - name: tag
    value: '1.0.$(Build.BuildId)'
  - name: vmImageName
    value: 'ubuntu-latest'
  # Pinned tool version for reproducible scans (bump deliberately).
  - name: gitleaksVersion
    value: '8.18.4'

stages:
- stage: Validate
  displayName: Build & Security Scan
  jobs:
  - job: BuildAndScan
    displayName: Build & Scan
    pool:
      vmImage: $(vmImageName)
    steps:
    # 1) Secret scanning (fail-closed). Runs on source before the build so a leaked
    #    credential fails in seconds instead of after a multi-minute image build.
    - task: Bash@3
      displayName: 'Gitleaks - Secret scan'
      inputs:
        targetType: inline
        script: |
          set -e
          echo "Installing Gitleaks v$(gitleaksVersion)..."
          wget -qO gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v$(gitleaksVersion)/gitleaks_$(gitleaksVersion)_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          sudo mv gitleaks /usr/local/bin/
          echo "Scanning working tree for secrets..."
          # --no-git scans current files (predictable for a PR gate); exit code 1 on any finding.
          gitleaks detect --source "$(Build.SourcesDirectory)" --no-git --redact --no-banner -v

    # 2) Python SAST (fail-closed). Static analysis of the vote service source.
    - task: Bash@3
      displayName: 'Bandit - Python SAST'
      inputs:
        targetType: inline
        script: |
          set -e
          python -m pip install --upgrade pip
          pip install bandit
          echo "Running Bandit on vote/ ..."
          # -lll: HIGH severity only, -ii: MEDIUM+ confidence. Only HIGH findings fail the gate.
          bandit -r vote/ -lll -ii

    # 3) Dockerfile misconfiguration scan (fail-closed). Also installs Trivy for step 5.
    - task: Bash@3
      displayName: 'Trivy - Dockerfile config scan'
      inputs:
        targetType: inline
        script: |
          set -e
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          echo "Scanning Dockerfile for misconfigurations..."
          trivy config --severity HIGH,CRITICAL --exit-code 1 vote/

    # 4) Build the image (no push — this is a validation pipeline).
    - task: Docker@2
      displayName: 'Build Docker image'
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          $(tag)

    # 5) Image vulnerability scan (fail-closed). Trivy is already installed from step 3.
    - task: Bash@3
      displayName: 'Trivy - Image vulnerability scan'
      inputs:
        targetType: inline
        script: |
          set -e
          echo "Scanning built image for HIGH/CRITICAL vulnerabilities..."
          trivy image --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed $(imageRepository):$(tag)
