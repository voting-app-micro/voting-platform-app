# votes-PR-Build: https://dev.azure.com/neesh90900932/PythonWorks/_build?definitionId=2&_a=summary
name: voter Microservice - Build and Push to ACR

#Adding path based trigger as this pipeline only should trigger if changes made in votes microservices.
trigger:
  branches:
    include:
      - main
  paths:
    include:
      - vote/*

resources:
- repo: self

variables:
  - group: voting-platform-secrets
  - name: dockerRegistryServiceConnection
    value: $(ACRRegistryServiceConnection)
  - name: imageRepository
    value: 'votingapp-vote'
  - name: dockerfilePath
    value: '$(Build.SourcesDirectory)/vote/Dockerfile'
  - name: tag
    value: '$(Build.BuildId)'
  - name: vmImageName
    value: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build Docker Image
  jobs:
  - job: BuildJob
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build Docker image
      inputs:
        command: build
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        tags: |
          $(tag)

    - task: Bash@3
      displayName: Tag Docker image with registry path
      env:
        IMAGE_REPO: $(imageRepository)
        IMAGE_TAG: $(tag)
        REGISTRY: $(ContainerRegistry)
      inputs:
        targetType: inline
        script: |
          set -e
          echo "Tagging image with registry path..."
          echo "Image Repo: $IMAGE_REPO"
          echo "Image Tag: $IMAGE_TAG"
          echo "Registry: $REGISTRY"
          docker tag $IMAGE_REPO:$IMAGE_TAG $REGISTRY/$IMAGE_REPO:$IMAGE_TAG
          echo "Image tagged successfully"
          docker images | grep $IMAGE_REPO

    - task: Bash@3
      displayName: Export Docker image to tar
      inputs:
        targetType: inline
        script: |
          set -e
          mkdir -p $(Build.ArtifactStagingDirectory)
          docker save -o $(Build.ArtifactStagingDirectory)/votingapp-vote-$(tag).tar $(ContainerRegistry)/$(imageRepository):$(tag)
          echo "Docker image exported to tar file"
          ls -lh $(Build.ArtifactStagingDirectory)/

    - task: PublishBuildArtifacts@1
      displayName: Publish Docker image artifact
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: 'docker-image-vote-$(Build.BuildId)'
        publishLocation: Container

- stage: Push
  displayName: Push to Azure Container Registry
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: PushJob
    displayName: Push
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: DownloadBuildArtifacts@0
      displayName: Download Docker image artifact
      inputs:
        buildType: current
        downloadType: single
        artifactName: 'docker-image-vote-$(Build.BuildId)'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: Bash@3
      displayName: Load Docker image from tar
      inputs:
        targetType: inline
        script: |
          set -e
          echo "Loading Docker image from artifact..."
          docker load -i $(System.ArtifactsDirectory)/docker-image-vote-$(Build.BuildId)/votingapp-vote-$(tag).tar
          echo "Docker image loaded successfully"
          docker images

    - task: Docker@2
      displayName: Push image to ACR
      inputs:
        command: push
        containerRegistry: $(dockerRegistryServiceConnection)
        repository: $(imageRepository)
        tags: |
          $(tag)
